<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Computer Terminal - Lab Connect</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    :root{--bg:#0f1117;--card:#1a1d27;--border:#2a2d3a;--text:#e2e8f0;--muted:#64748b;--accent:#6366f1;--success:#10b981;--danger:#ef4444;}
    *{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:'Inter',ui-sans-serif,system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding:0 0 3rem;
      background-image:radial-gradient(ellipse at 80% 0%,rgba(99,102,241,.08) 0%,transparent 50%),radial-gradient(ellipse at 20% 100%,rgba(139,92,246,.06) 0%,transparent 50%);}
    /* Top nav */
    .top-nav{display:flex;align-items:center;justify-content:space-between;padding:.75rem 1.25rem;border-bottom:1px solid var(--border);background:rgba(26,29,39,.8);backdrop-filter:blur(12px);position:sticky;top:0;z-index:10;}
    .back-btn{display:inline-flex;align-items:center;gap:.4rem;color:var(--muted);font-size:.82rem;text-decoration:none;padding:.4rem .75rem;border:1px solid var(--border);border-radius:8px;background:rgba(255,255,255,.03);transition:all .2s;cursor:pointer;border:none;}
    .back-btn:hover{color:var(--text);background:rgba(255,255,255,.06);}
    .nav-badge{font-size:.72rem;color:#818cf8;background:rgba(99,102,241,.12);border:1px solid rgba(99,102,241,.2);padding:.25rem .65rem;border-radius:999px;}
    /* Container */
    .container{max-width:560px;margin:0 auto;padding:1.5rem 1rem;display:flex;flex-direction:column;gap:1.25rem;}
    /* Card */
    .card{background:var(--card);border:1px solid var(--border);border-radius:14px;overflow:hidden;}
    .card-hdr{padding:1.1rem 1.4rem;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:.75rem;}
    .card-icon{width:40px;height:40px;background:linear-gradient(135deg,rgba(99,102,241,.2),rgba(139,92,246,.2));border:1px solid rgba(99,102,241,.3);border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
    .card-title{font-size:.95rem;font-weight:700;}
    .card-sub{font-size:.72rem;color:var(--muted);margin-top:.1rem;}
    .card-body{padding:1.1rem 1.4rem;}
    /* Info grid */
    .info-grid{display:grid;grid-template-columns:1fr 1fr;gap:.75rem;}
    .info-item{background:rgba(255,255,255,.03);border:1px solid var(--border);border-radius:9px;padding:.75rem;}
    .info-label{font-size:.68rem;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:.3rem;}
    .info-val{font-size:.9rem;font-weight:600;}
    .info-item.full{grid-column:1/-1;}
    /* Status banner */
    .status-banner{display:flex;align-items:center;gap:.75rem;padding:.9rem 1rem;border-radius:10px;margin-bottom:1rem;}
    .status-banner.ok{background:rgba(16,185,129,.08);border:1px solid rgba(16,185,129,.2);}
    .status-banner.bad{background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.2);}
    .status-icon{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
    .status-icon.ok{background:rgba(16,185,129,.15);color:#10b981;}
    .status-icon.bad{background:rgba(239,68,68,.15);color:#ef4444;}
    .status-label{font-size:.68rem;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;}
    .status-val{font-size:1rem;font-weight:700;}
    .status-val.ok{color:#10b981;}
    .status-val.bad{color:#ef4444;}
    /* Form */
    .form-group{margin-bottom:1rem;}
    .form-group label{display:block;font-size:.78rem;font-weight:600;color:#94a3b8;margin-bottom:.35rem;}
    .form-input{width:100%;background:#0d0f18;border:1px solid var(--border);border-radius:8px;padding:.6rem .875rem;color:var(--text);font-size:.875rem;outline:none;transition:border-color .2s;}
    .form-input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(99,102,241,.15);}
    textarea.form-input{resize:vertical;min-height:80px;}
    select.form-input{cursor:pointer;}
    .btn-submit{width:100%;background:linear-gradient(135deg,#6366f1,#8b5cf6);color:#fff;border:none;border-radius:9px;padding:.75rem;font-size:.9rem;font-weight:700;cursor:pointer;transition:opacity .2s,transform .1s;box-shadow:0 4px 16px rgba(99,102,241,.3);display:flex;align-items:center;justify-content:center;gap:.5rem;}
    .btn-submit:hover{opacity:.9;transform:translateY(-1px);}
    /* Review items */
    .review-item{background:rgba(255,255,255,.03);border:1px solid var(--border);border-radius:10px;padding:.875rem;margin-bottom:.6rem;}
    .review-item:last-child{margin-bottom:0;}
    .review-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:.4rem;}
    .badge{display:inline-flex;align-items:center;gap:.3rem;padding:.2rem .6rem;border-radius:999px;font-size:.7rem;font-weight:600;}
    .badge-ok{background:rgba(16,185,129,.15);color:#34d399;}
    .badge-bad{background:rgba(239,68,68,.15);color:#f87171;}
    .review-time{font-size:.7rem;color:var(--muted);}
    .review-comment{font-size:.8rem;color:#94a3b8;margin-top:.35rem;line-height:1.5;}
    /* Toast */
    #toastContainer{position:fixed;bottom:1rem;right:1rem;z-index:100;display:flex;flex-direction:column;gap:.5rem;pointer-events:none;}
    .toast{background:var(--card);border:1px solid var(--border);color:var(--text);padding:.75rem 1rem;border-radius:10px;font-size:.83rem;pointer-events:auto;box-shadow:0 8px 24px rgba(0,0,0,.4);display:flex;align-items:center;gap:.5rem;}
    .toast.ok{border-color:rgba(16,185,129,.4);color:#34d399;}
    .toast.err{border-color:rgba(239,68,68,.4);color:#f87171;}
    @keyframes spin{to{transform:rotate(360deg);}}
  </style>
</head>
<body>
  <div class="top-nav">
    <button class="back-btn" onclick="history.back()">
      <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"/></svg>
      Back to Lab
    </button>
    <span class="nav-badge">Lab Connect</span>
  </div>

  <div class="container">
    <!-- Computer Details -->
    <div class="card">
      <div class="card-hdr">
        <div class="card-icon">
          <svg width="20" height="20" fill="none" stroke="#818cf8" stroke-width="2" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" d="M9.75 17L9 20l-1 1h8l-1-1-.75-3M3 13h18M5 17h14a2 2 0 002-2V5a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/>
          </svg>
        </div>
        <div>
          <div class="card-title">Computer Details</div>
          <div class="card-sub">System information &amp; status</div>
        </div>
      </div>
      <div class="card-body">
        <div id="computerInfo">
          <div style="color:var(--muted);font-size:.875rem;">Loading info...</div>
        </div>
      </div>
    </div>

    <!-- Submit Review -->
    <div class="card">
      <div class="card-hdr">
        <div class="card-icon">
          <svg width="20" height="20" fill="none" stroke="#818cf8" stroke-width="2" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/>
          </svg>
        </div>
        <div class="card-title">Submit Review</div>
      </div>
      <div class="card-body">
        <form id="reviewForm">
          <div class="form-group">
            <label>Status</label>
            <select id="reviewStatus" required class="form-input">
              <option value="">Select Status</option>
              <option value="Working">Working</option>
              <option value="Not Working">Not Working</option>
            </select>
          </div>
          <div class="form-group">
            <label>Comment <span style="color:var(--muted);font-weight:400;">(Optional)</span></label>
            <textarea id="reviewComment" rows="3" placeholder="Any additional comments..." class="form-input"></textarea>
          </div>
          <button type="submit" class="btn-submit">
            <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"/>
            </svg>
            Submit Review
          </button>
        </form>
      </div>
    </div>

    <!-- Review History -->
    <div class="card">
      <div class="card-hdr">
        <div class="card-icon">
          <svg width="20" height="20" fill="none" stroke="#818cf8" stroke-width="2" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-3 7h3m-3 4h3m-6-4h.01M9 16h.01"/>
          </svg>
        </div>
        <div style="display:flex;align-items:center;justify-content:space-between;flex:1;">
          <div class="card-title">Review History</div>
          <span style="font-size:.7rem;color:var(--muted);background:rgba(255,255,255,.05);border:1px solid var(--border);padding:.15rem .5rem;border-radius:999px;">Recent</span>
        </div>
      </div>
      <div class="card-body">
        <div id="reviewsList"></div>
      </div>
    </div>
  </div>

  <div id="toastContainer"></div>
  <script type="module" src="./js/computer.js"></script>
</body>
</html>
