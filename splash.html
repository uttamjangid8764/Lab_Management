<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>UEM-LAB</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;}
    body{
      font-family:'Inter',ui-sans-serif,system-ui,sans-serif;
      background:#0a0e1a;
      min-height:100vh;display:flex;align-items:center;justify-content:center;
      overflow:hidden;
      background-image:
        radial-gradient(ellipse 80% 60% at 20% -10%,rgba(99,102,241,.6) 0%,transparent 60%),
        radial-gradient(ellipse 60% 50% at 80% 110%,rgba(139,92,246,.5) 0%,transparent 55%);
    }
    /* Grid */
    body::before{content:'';position:fixed;inset:0;
      background-image:linear-gradient(rgba(99,102,241,.07) 1px,transparent 1px),linear-gradient(90deg,rgba(99,102,241,.07) 1px,transparent 1px);
      background-size:55px 55px;animation:gridFade 1s ease forwards;}
    @keyframes gridFade{from{opacity:0;}to{opacity:1;}}

    /* Orbs */
    .orb{position:fixed;border-radius:50%;filter:blur(100px);animation:orbPulse 3s ease-in-out infinite;}
    .o1{width:600px;height:600px;background:rgba(99,102,241,.25);top:-200px;left:-150px;animation-delay:0s;}
    .o2{width:500px;height:500px;background:rgba(139,92,246,.2);bottom:-150px;right:-100px;animation-delay:-1.5s;}
    .o3{width:300px;height:300px;background:rgba(6,182,212,.15);top:50%;left:55%;animation-delay:-3s;}
    @keyframes orbPulse{0%,100%{transform:scale(1);}50%{transform:scale(1.08);}}

    /* Center content */
    .splash{position:relative;z-index:1;text-align:center;animation:splashIn .8s cubic-bezier(.34,1.56,.64,1) forwards;}
    @keyframes splashIn{from{opacity:0;transform:scale(.7) translateY(30px);}to{opacity:1;transform:scale(1) translateY(0);}}

    /* Logo */
    .logo-ring{
      width:100px;height:100px;
      background:linear-gradient(135deg,rgba(99,102,241,.3),rgba(139,92,246,.3));
      backdrop-filter:blur(20px);
      border:2px solid rgba(255,255,255,.2);
      border-radius:28px;
      display:flex;align-items:center;justify-content:center;
      margin:0 auto 1.5rem;
      box-shadow:0 0 60px rgba(99,102,241,.5), 0 0 120px rgba(99,102,241,.2), inset 0 1px 0 rgba(255,255,255,.2);
      animation:logoPulse 2s ease-in-out infinite;
    }
    @keyframes logoPulse{0%,100%{box-shadow:0 0 60px rgba(99,102,241,.5),0 0 120px rgba(99,102,241,.2),inset 0 1px 0 rgba(255,255,255,.2);}50%{box-shadow:0 0 80px rgba(99,102,241,.7),0 0 160px rgba(99,102,241,.3),inset 0 1px 0 rgba(255,255,255,.25);}}

    .brand-name{
      font-size:2.8rem;font-weight:900;letter-spacing:-.03em;
      background:linear-gradient(135deg,#fff 0%,#a5b4fc 50%,#8b5cf6 100%);
      -webkit-background-clip:text;-webkit-text-fill-color:transparent;
      margin-bottom:.4rem;
    }
    .brand-sub{color:rgba(255,255,255,.5);font-size:.95rem;letter-spacing:.08em;text-transform:uppercase;margin-bottom:2.5rem;}

    /* Loading bar */
    .loader-wrap{width:200px;margin:0 auto;position:relative;}
    .loader-track{height:3px;background:rgba(255,255,255,.1);border-radius:999px;overflow:hidden;}
    .loader-bar{height:100%;width:0%;background:linear-gradient(90deg,#6366f1,#8b5cf6,#06b6d4);border-radius:999px;animation:loadBar 2.2s cubic-bezier(.4,0,.2,1) forwards;}
    @keyframes loadBar{0%{width:0%;}60%{width:75%;}85%{width:92%;}100%{width:100%;}}

    /* Dots */
    .dots{display:flex;justify-content:center;gap:.4rem;margin-top:1rem;}
    .dot{width:5px;height:5px;border-radius:50%;background:rgba(255,255,255,.3);animation:dotBounce .8s ease-in-out infinite;}
    .dot:nth-child(2){animation-delay:.15s;}
    .dot:nth-child(3){animation-delay:.3s;}
    @keyframes dotBounce{0%,100%{transform:translateY(0);opacity:.3;}50%{transform:translateY(-5px);opacity:1;background:rgba(165,180,252,.8);}}

    /* Particles */
    .particles{position:fixed;inset:0;pointer-events:none;z-index:0;}
    .p{position:absolute;border-radius:50%;background:rgba(99,102,241,.6);animation:pRise linear infinite;}
    @keyframes pRise{0%{transform:translateY(100vh);opacity:0;}10%{opacity:1;}90%{opacity:.4;}100%{transform:translateY(-5vh);opacity:0;}}

    /* Fade out */
    body.fade-out{animation:fadeOut .6s ease forwards;}
    @keyframes fadeOut{to{opacity:0;}}
  </style>
</head>
<body>
  <div class="orb o1"></div><div class="orb o2"></div><div class="orb o3"></div>
  <div class="particles" id="particles"></div>

  <div class="splash">
    <div class="logo-ring">
      <svg width="48" height="48" fill="none" stroke="url(#lg)" stroke-width="1.8" viewBox="0 0 24 24">
        <defs>
          <linearGradient id="lg" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#a5b4fc"/>
            <stop offset="100%" stop-color="#8b5cf6"/>
          </linearGradient>
        </defs>
        <path stroke-linecap="round" stroke-linejoin="round" d="M9.75 17L9 20l-1 1h8l-1-1-.75-3M3 13h18M5 17h14a2 2 0 002-2V5a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/>
      </svg>
    </div>
    <div class="brand-name">UEM-LAB</div>
    <div class="brand-sub">Computer Lab Management System</div>
    <div class="loader-wrap">
      <div class="loader-track"><div class="loader-bar" id="loaderBar"></div></div>
      <div class="dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
    </div>
  </div>

  <script>
    // Particles
    const pc = document.getElementById('particles');
    for(let i=0;i<18;i++){
      const p=document.createElement('div');p.className='p';
      p.style.cssText=`left:${Math.random()*100}vw;width:${2+Math.random()*3}px;height:${2+Math.random()*3}px;animation-duration:${8+Math.random()*10}s;animation-delay:${Math.random()*8}s;`;
      pc.appendChild(p);
    }
    // Redirect after animation
    setTimeout(()=>{
      document.body.classList.add('fade-out');
      setTimeout(()=>window.location.href='./index.html',600);
    },2800);
  </script>
</body>
</html>
