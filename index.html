<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>UEM-LAB - Login</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
  <style>
    :root{--bg:#0f1117;--card:#1a1d27;--border:#2a2d3a;--text:#e2e8f0;--muted:#64748b;--accent:#6366f1;}
    *{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:'Inter',ui-sans-serif,system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:1rem;overflow:hidden;position:relative;}
    /* Animated BG */
    .orb{position:fixed;border-radius:50%;filter:blur(80px);opacity:.15;animation:orbFloat 9s ease-in-out infinite;pointer-events:none;}
    .o1{width:500px;height:500px;background:#6366f1;top:-150px;left:-100px;animation-delay:0s;}
    .o2{width:380px;height:380px;background:#8b5cf6;bottom:-80px;right:-80px;animation-delay:-4s;}
    .o3{width:280px;height:280px;background:#06b6d4;top:50%;left:55%;animation-delay:-7s;}
    @keyframes orbFloat{0%,100%{transform:translate(0,0) scale(1);}40%{transform:translate(25px,-25px) scale(1.04);}70%{transform:translate(-15px,15px) scale(.97);}}
    .grid-bg{position:fixed;inset:0;background-image:linear-gradient(rgba(99,102,241,.04) 1px,transparent 1px),linear-gradient(90deg,rgba(99,102,241,.04) 1px,transparent 1px);background-size:55px 55px;pointer-events:none;}
    .particles{position:fixed;inset:0;pointer-events:none;}
    .particle{position:absolute;border-radius:50%;background:rgba(99,102,241,.5);animation:rise linear infinite;}
    @keyframes rise{0%{transform:translateY(100vh);opacity:0;}10%{opacity:1;}90%{opacity:.4;}100%{transform:translateY(-5vh);opacity:0;}}
    /* Card */
    .card{position:relative;z-index:1;background:var(--card);border:1px solid var(--border);border-radius:18px;padding:2.5rem 2rem;width:100%;max-width:400px;box-shadow:0 30px 60px rgba(0,0,0,.5);}
    .logo-wrap{width:58px;height:58px;background:linear-gradient(135deg,#6366f1,#8b5cf6);border-radius:15px;display:flex;align-items:center;justify-content:center;margin:0 auto 1.25rem;box-shadow:0 8px 24px rgba(99,102,241,.4);}
    h1{font-size:1.6rem;font-weight:800;text-align:center;margin-bottom:.25rem;background:linear-gradient(135deg,#e2e8f0,#818cf8);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
    .sub{color:var(--muted);font-size:.85rem;text-align:center;margin-bottom:2rem;}
    label{display:block;font-size:.78rem;font-weight:600;color:#94a3b8;margin-bottom:.35rem;letter-spacing:.03em;}
    .inp-wrap{margin-bottom:1.1rem;}
    .inp{width:100%;background:#0d0f18;border:1px solid var(--border);border-radius:9px;padding:.65rem .9rem;color:var(--text);font-size:.9rem;outline:none;transition:border-color .2s,box-shadow .2s;}
    .inp:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(99,102,241,.15);}
    .inp-rel{position:relative;}
    .inp-rel .inp{padding-right:2.5rem;}
    .eye{position:absolute;right:.75rem;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--muted);display:flex;align-items:center;padding:0;}
    .eye:hover{color:var(--text);}
    .btn-main{width:100%;background:linear-gradient(135deg,#6366f1,#8b5cf6);color:#fff;border:none;border-radius:9px;padding:.75rem;font-size:.9rem;font-weight:700;cursor:pointer;margin-top:.5rem;transition:opacity .2s,transform .1s;box-shadow:0 4px 18px rgba(99,102,241,.35);}
    .btn-main:hover{opacity:.9;transform:translateY(-1px);}
    .btn-main:active{transform:translateY(0);}
    .btn-main:disabled{opacity:.6;cursor:not-allowed;transform:none;}
    .divider{display:flex;align-items:center;gap:.75rem;margin:1.5rem 0;}
    .divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--border);}
    .divider span{color:var(--muted);font-size:.72rem;letter-spacing:.05em;}
    .student-box{background:rgba(99,102,241,.06);border:1px solid rgba(99,102,241,.2);border-radius:11px;padding:1rem;text-align:center;}
    .student-box p{color:var(--muted);font-size:.78rem;margin-bottom:.75rem;}
    .btn-scan{width:100%;background:rgba(255,255,255,.05);color:var(--text);border:1px solid var(--border);border-radius:9px;padding:.6rem;font-size:.85rem;font-weight:500;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:.5rem;transition:background .2s;}
    .btn-scan:hover{background:rgba(255,255,255,.09);}
    .sim{text-align:center;margin-top:.75rem;font-size:.72rem;color:var(--muted);}
    .sim a{color:var(--accent);text-decoration:none;}
    .sim a:hover{text-decoration:underline;}
    /* Scanner */
    #scanWrap{display:none;margin-top:.75rem;}
    #scanBox{position:relative;border-radius:10px;overflow:hidden;background:#000;aspect-ratio:1;}
    #qrVideo{width:100%;height:100%;object-fit:cover;display:block;}
    .scan-frame{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;pointer-events:none;}
    .scan-frame-inner{width:62%;height:62%;border:2px solid #6366f1;border-radius:10px;box-shadow:0 0 0 9999px rgba(0,0,0,.45);}
    .scan-line{position:absolute;width:62%;height:2px;background:linear-gradient(90deg,transparent,#6366f1,transparent);animation:scanLine 2s linear infinite;}
    @keyframes scanLine{0%{top:19%;}100%{top:81%;}}
    #stopScan{margin-top:.5rem;width:100%;background:rgba(239,68,68,.1);color:#ef4444;border:1px solid rgba(239,68,68,.2);border-radius:8px;padding:.5rem;font-size:.78rem;cursor:pointer;}
    #scanMsg{font-size:.72rem;color:var(--muted);text-align:center;margin-top:.35rem;}
    /* Toast */
    #toastContainer{position:fixed;bottom:1rem;right:1rem;z-index:100;display:flex;flex-direction:column;gap:.5rem;pointer-events:none;}
  </style>
</head>
<body>
  <div class="orb o1"></div><div class="orb o2"></div><div class="orb o3"></div>
  <div class="grid-bg"></div>
  <div class="particles" id="particles"></div>

  <div class="card">
    <div class="logo-wrap">
      <svg width="28" height="28" fill="none" stroke="#fff" stroke-width="2" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" d="M9.75 17L9 20l-1 1h8l-1-1-.75-3M3 13h18M5 17h14a2 2 0 002-2V5a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/>
      </svg>
    </div>
    <h1>UEM-LAB</h1>
    <p class="sub">Computer Lab Management System</p>

    <form id="loginForm">
      <div class="inp-wrap">
        <label for="email">Email Address</label>
        <input class="inp" type="email" id="email" required placeholder="admin@example.com"/>
      </div>
      <div class="inp-wrap">
        <label for="password">Password</label>
        <div class="inp-rel">
          <input class="inp" type="password" id="password" required placeholder="••••••••"/>
          <button type="button" id="togglePassword" class="eye">
            <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
              <path id="eyePath" stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
              <path stroke-linecap="round" stroke-linejoin="round" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
            </svg>
          </button>
        </div>
      </div>
      <button type="submit" class="btn-main" id="loginBtn">Sign In as Admin</button>
    </form>

    <div class="divider"><span>STUDENT ACCESS</span></div>

    <div class="student-box">
      <p>Scan the QR code on your computer terminal to access as a student.</p>
      <button class="btn-scan" id="scanQRBtn">
        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" d="M12 4v1m6 11h2m-6 0h-2v4m0-11v3m0 0h.01M12 12h4.01M16 20h4M4 12h4m12 0h.01M5 8h2a1 1 0 001-1V5a1 1 0 00-1-1H5a1 1 0 00-1 1v2a1 1 0 001 1zm12 0h2a1 1 0 001-1V5a1 1 0 00-1-1h-2a1 1 0 00-1 1v2a1 1 0 001 1zM5 20h2a1 1 0 001-1v-2a1 1 0 00-1-1H5a1 1 0 00-1 1v2a1 1 0 001 1z"/>
        </svg>
        Scan QR Code
      </button>
      <div id="scanWrap">
        <div id="scanBox">
          <video id="qrVideo" playsinline autoplay muted></video>
          <canvas id="qrCanvas" style="display:none"></canvas>
          <div class="scan-frame"><div class="scan-frame-inner"></div></div>
          <div class="scan-line"></div>
        </div>
        <button id="stopScan">✕ Stop Scanning</button>
        <p id="scanMsg">Point camera at QR code...</p>
      </div>
    </div>

    <p class="sim">Need help? Contact your lab administrator.</p>
  </div>

  <div id="toastContainer"></div>
  <script type="module" src="./js/login.js"></script>
  <script>
    // Particles
    const pc = document.getElementById('particles');
    for(let i=0;i<20;i++){
      const p=document.createElement('div');p.className='particle';
      p.style.cssText=`left:${Math.random()*100}vw;width:${2+Math.random()*3}px;height:${2+Math.random()*3}px;animation-duration:${9+Math.random()*12}s;animation-delay:${Math.random()*10}s;opacity:${.3+Math.random()*.5}`;
      pc.appendChild(p);
    }
    // Eye toggle
    document.getElementById('togglePassword').addEventListener('click',function(){
      const inp=document.getElementById('password');
      inp.type=inp.type==='password'?'text':'password';
    });
    // QR Scanner
    let stream=null,scanTick=null;
    document.getElementById('scanQRBtn').addEventListener('click',async()=>{
      const wrap=document.getElementById('scanWrap'),msg=document.getElementById('scanMsg');
      if(!navigator.mediaDevices?.getUserMedia){
        msg.textContent='⚠ Camera not supported. Use HTTPS or localhost.';msg.style.color='#ef4444';wrap.style.display='block';return;
      }
      try{
        stream=await navigator.mediaDevices.getUserMedia({video:{facingMode:'environment'}});
        document.getElementById('qrVideo').srcObject=stream;
        wrap.style.display='block';msg.textContent='Point camera at QR code...';msg.style.color='var(--muted)';
        startScan();
      }catch(e){
        wrap.style.display='block';msg.style.color='#ef4444';
        msg.textContent=e.name==='NotAllowedError'?'⚠ Camera permission denied.':'⚠ '+e.message;
      }
    });
    function startScan(){
      const v=document.getElementById('qrVideo'),c=document.getElementById('qrCanvas'),ctx=c.getContext('2d'),msg=document.getElementById('scanMsg');
      scanTick=setInterval(()=>{
        if(v.readyState===v.HAVE_ENOUGH_DATA){
          c.width=v.videoWidth;c.height=v.videoHeight;ctx.drawImage(v,0,0,c.width,c.height);
          const d=ctx.getImageData(0,0,c.width,c.height),code=jsQR(d.data,d.width,d.height);
          if(code){msg.textContent='✓ QR detected! Redirecting...';msg.style.color='#10b981';stopScan();setTimeout(()=>window.location.href=code.data,500);}
        }
      },300);
    }
    function stopScan(){clearInterval(scanTick);stream?.getTracks().forEach(t=>t.stop());stream=null;}
    document.getElementById('stopScan').addEventListener('click',()=>{stopScan();document.getElementById('scanWrap').style.display='none';});
  </script>
</body>
</html>
